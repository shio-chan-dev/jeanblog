interface:
  display_name: "Algorithm Tutorial Builder"
  short_description: "v0.2.0 - Build publishable algorithm and method tutorials"
  default_prompt: "Use $algorithm-tutorial-builder to draft a publishable long-form, derivation-first tutorial about one concrete algorithm, method, or data structure for this Hugo blog, choose a repo-aligned path with minimal front matter and basic taxonomy, grow the mechanism step by step when code matters, and converge to one final runnable complete implementation or minimal complete demo without switching into LeetCode-style problem-solution framing."
